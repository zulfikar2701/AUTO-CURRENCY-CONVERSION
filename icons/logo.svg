<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Coin 1 - Dollar -->
  <circle cx="80" cy="100" r="45" fill="url(#coin)" opacity="0.95"/>
  <circle cx="80" cy="100" r="38" fill="none" stroke="#d97706" stroke-width="2"/>
  <text x="80" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#92400e">$</text>

  <!-- Arrow -->
  <path d="M140 100 L175 100" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M170 90 L180 100 L170 110" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Coin 2 - Euro -->
  <circle cx="215" cy="85" r="32" fill="url(#coin)" opacity="0.85"/>
  <circle cx="215" cy="85" r="26" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <text x="215" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#92400e">€</text>

  <!-- Coin 3 - Yen -->
  <circle cx="195" cy="130" r="28" fill="url(#coin)" opacity="0.75"/>
  <circle cx="195" cy="130" r="22" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <text x="195" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#92400e">¥</text>

  <!-- Coin 4 - Pound -->
  <circle cx="245" cy="120" r="25" fill="url(#coin)" opacity="0.7"/>
  <circle cx="245" cy="120" r="20" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <text x="245" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#92400e">£</text>

  <!-- Title -->
  <text x="310" y="95" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">Auto Currency</text>
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">Conversion</text>

  <!-- Subtitle -->
  <text x="310" y="158" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.75)">Hover to convert — Chrome &amp; Edge Extension</text>
</svg>
